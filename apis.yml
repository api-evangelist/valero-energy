aid: valero-energy
name: Valero Energy
description: >-
  Valero Energy Corporation is the world's largest independent petroleum refiner and
  a leading producer of low-carbon transportation fuels. Headquartered in San Antonio,
  Texas, Valero operates 14 petroleum refineries with 3 million barrels per day capacity,
  12 ethanol plants, and renewable diesel production facilities across the US, Canada,
  and UK. The company trades on NYSE as VLO and is a Fortune 100 company.
