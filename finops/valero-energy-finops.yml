  BillingCurrency: USD
meters:
  - name: contracted_access
    description: API/EDI access provisioned under a trading-partner or customer agreement; not metered as a developer billing line
    unit: varies
    aggregation: count
principles:
  - name: Visibility
    description: Valero does not expose public API usage telemetry; partners reconcile via their own EDI/middleware logs.
  - name: Allocation
    description: Costs are not allocated to API line items; they sit in the underlying purchase or sales invoice for petroleum/renewable products.
  - name: Optimization
    description: Optimization happens at the commercial-contract and integration-cadence level (batching, scheduling, EDI map design) rather than per-call cost.
  - name: Accountability
    description: Owned by the trading-partner counterparty's commercial and IT operations teams under the master agreement.
